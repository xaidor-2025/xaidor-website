<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XAIDOR | Learn AI & Future Tech Skills</title>
    <meta
      name="description"
      content="XAIDOR is Kerala's leading AI learning platform offering affordable, practical training in artificial intelligence, modern tech skills, and future-ready tools."
    />
    <meta
      name="keywords"
      content="AI course Kerala, learn AI India, artificial intelligence training, Xaidor, AI academy, tech skills, machine learning beginners"
    />
    <meta name="author" content="XAIDOR" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO / Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta
      property="og:title"
      content="XAIDOR | Learn AI & Future Tech Skills"
    />
    <meta
      property="og:description"
      content="Join XAIDOR to learn artificial intelligence with hands-on practical training. Affordable AI education for everyone."
    />
    <meta property="og:image" content="https://xaidor.com/preview.png" />
    <meta property="og:url" content="https://xaidor.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XAIDOR | AI Learning Platform" />
    <meta
      name="twitter:description"
      content="Learn AI, build real-world projects, and become future-ready with XAIDOR."
    />
    <meta name="twitter:image" content="https://xaidor.com/preview.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://xaidor.com/" />

    <!-- Performance (optional but useful) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
